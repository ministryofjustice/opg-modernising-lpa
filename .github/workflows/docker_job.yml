name: "[Job] Docker Build, Scan and Push to ECR"
#
on:
  workflow_call:
    inputs:
      tag:
        description: "Tag for docker image"
        required: true
        type: string
      checkout_tag:
        description: "Ref or tag to checkout"
        default: ${{ github.ref }}
        required: false
        type: string
      branch_name:
        description: "Branch name"
        required: true
        type: string
    secrets:
      SNYK_OPG_ORG_TOKEN:
        required: true

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: read

jobs:
  docker_build_scan_push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ecr_repository: modernising-lpa/app
            name: app
            path: ./docker/mlpa/Dockerfile
            platforms: linux/amd64
            service_path: ./docker/mlpa
            snyk_policy_path: docker/mlpa/.snyk
            scan_id: app

          - ecr_repository: modernising-lpa/create-s3-batch-replication-job
            name: create-s3-batch-replication-job
            path: ./docker/create-s3-replication-job/Dockerfile
            service_path: ./docker/create-s3-replication-job
            snyk_policy_path: docker/create-s3-replication-job/.snyk
            scan_id: create_s3_batch_replication_job
            platforms: linux/amd64

          - ecr_repository: modernising-lpa/event-received
            name: event-received
            path: ./docker/event-received/Dockerfile
            service_path: ./docker/event-received
            snyk_policy_path: docker/event-received/.snyk
            scan_id: event_received
            platforms: linux/amd64

          - ecr_repository: modernising-lpa/mock-pay
            name: mock-pay
            path: ./docker/mock-pay/Dockerfile
            service_path: ./docker/mock-pay
            snyk_policy_path: docker/mock-pay/.snyk
            scan_id: mock_pay
            platforms: linux/amd64

          - ecr_repository: modernising-lpa/schedule-runner
            name: schedule-runner
            path: ./docker/schedule-runner/Dockerfile
            service_path: ./docker/schedule-runner
            snyk_policy_path: docker/schedule-runner/.snyk
            scan_id: schedule_runner
            platforms: linux/amd64

          - ecr_repository: make-and-register-lpa-mainstream-content
            name: make-and-register-lpa-mainstream-content
            path: ./docker/mainstream-content/Dockerfile
            service_path: ./docker/mainstream-content
            snyk_policy_path: docker/mainstream-content/.snyk
            scan_id: make_and_register_lpa_mainstream_content
            platforms: linux/arm64

    runs-on: ubuntu-latest
    name: ${{ matrix.ecr_repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_tag }}

      - name: Warn missing linting action
        run: echo "::warning title=MISSING-DOCKER-LINT::Please add the Docker lint workflow step when an allowed action is available."
      # TODO: removed due to github actions non-compliance - add alternative allowed action when available.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        id: buildx_setup
        with:
          version: v0.15.1
          platforms: linux/amd64,linux/arm64

      - uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::311462405659:role/modernising-lpa-github-actions-ecr-push
          role-duration-seconds: 900
          role-session-name: GithubActionsECRPushMLPAB

      - name: ECR Login
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2
        with:
          mask-password: true
          registries: 311462405659

      - name: Build ${{ matrix.ecr_repository }} Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.path }}
          platforms: linux/amd64
          push: false
          load: true
          cache-from: type=registry,ref=${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:cache-${{ inputs.branch_name }}
          tags: |
            ${{ matrix.ecr_repository }}:${{ inputs.tag }}
          build-args: |
            TAG=${{inputs.tag}}
          target: production
        env:
          SOURCE_DATE_EPOCH: 0
          DOCKER_CONTENT_TRUST: 1

      #SNYK SCAN STEPS
      - name: Run SNYK vulnerability scan for ${{ matrix.scan_id }}
        id: snyk_scan
        uses: ministryofjustice/opg-github-actions/actions/snyk-scan@3a15a16fcc221821c2869eecd8822c5d62af2984 # v4.7.0
        with:
          SNYK_TEST_IMAGE: ${{ matrix.ecr_repository }}:${{ inputs.tag }}
          SNYK_TOKEN: ${{ secrets.SNYK_OPG_ORG_TOKEN }}
          sarif_filepath: ./test-results
          sarif_filename: ${{ matrix.scan_id }}_snyk.sarif
          snyk_policy_path: ${{ github.workspace }}/${{ matrix.snyk_policy_path }}
          snyk_test_args: --severity-threshold=high

      - name: Format undefined severity values
        if: always() && hashFiles(format('./test-results/{0}_snyk.sarif', matrix.scan_id)) != ''
        run: |
          sed -i 's/"null"/"0"/g; s/"undefined"/"0"/g' ./test-results/${{ matrix.scan_id }}_snyk.sarif

      - name: Inspect SARIF results
        if: always()
        run: |
          echo "=== SNYK SCAN SUMMARY FOR ${{ matrix.scan_id }} ==="
          echo "SARIF file: $file"
          echo "scan outcome: ${{ steps.snyk_scan.outcome }}"

          if [ -f "./test-results/${{ matrix.scan_id }}_snyk.sarif" ]; then
            echo "SARIF file exists, counting runs"
            runs=$(jq '.runs | length' ./test-results/${{ matrix.scan_id }}_snyk.sarif)
            echo "SARIF file has $runs runs"
          else
            echo "SARIF file does not exist, skipping run count"
          fi

      # Split SARIF results if run limit exceeds 20
      - name: Split SARIF results if run limit exceeds 20
        if: always()
        run: |
          file="./test-results/${{ matrix.scan_id }}_snyk.sarif"
          base="./test-results/${{ matrix.scan_id }}_snyk"

          if [ ! -f "$file" ]; then
            echo "SARIF file does not exist, skipping split"
            exit 0
          fi

          runs=$(jq '.runs | length' $file)
          echo "runs=$runs"

          if [ $runs -gt 20 ]; then
            echo "SARIF file has $runs runs, splitting into 2 files (20 run limit)"
            jq '.runs = .runs[0:20]' $file > ${base}_part_01.sarif
            jq '.runs = .runs[20:]' $file > ${base}_part_02.sarif
          else
            echo "SARIF file has $runs runs, keeping as 1 file"
            mv $file ${base}_part_01.sarif
          fi

      - name: Upload SARIF results part 1
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always() && hashFiles(format('./test-results/{0}_snyk_part_01.sarif', matrix.scan_id)) != ''
        with:
          sarif_file: ./test-results/${{ matrix.scan_id }}_snyk_part_01.sarif
          category: ${{ matrix.scan_id }}-1

      - name: Upload SARIF results part 2
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always() && hashFiles(format('./test-results/{0}_snyk_part_02.sarif', matrix.scan_id)) != ''
        with:
          sarif_file: ./test-results/${{ matrix.scan_id }}_snyk_part_02.sarif
          category: ${{ matrix.scan_id }}-2

      - name: Push ${{ matrix.ecr_repository }} Image to ECR for PR
        if: ${{ github.workflow != 'Path To Live' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.path }}
          builder: ${{ steps.buildx_setup.outputs.name }}
          push: true
          platforms: ${{ matrix.platforms }}
          cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,ref=${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:cache-${{ inputs.branch_name }}
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:${{ inputs.tag }}
          build-args: |
            TAG=${{inputs.tag}}
          sbom: false
          provenance: false
          target: production
        env:
          SOURCE_DATE_EPOCH: 0
          DOCKER_CONTENT_TRUST: 1

      - name: Push ${{ matrix.ecr_repository }} Image to ECR for Path to Live
        if: ${{ github.workflow == 'Path To Live' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.path }}
          builder: ${{ steps.buildx_setup.outputs.name }}
          push: true
          platforms: ${{ matrix.platforms }}
          cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,ref=${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:cache-${{ inputs.branch_name }}
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:${{ inputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:main-${{ inputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ matrix.ecr_repository }}:latest
          build-args: |
            TAG=${{inputs.tag}}
          sbom: false
          provenance: false
          target: production
        env:
          SOURCE_DATE_EPOCH: 0
          DOCKER_CONTENT_TRUST: 1
