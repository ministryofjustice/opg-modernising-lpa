# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  node: system

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace # trims trailing whitespace.
      - id: end-of-file-fixer # ensures that a file is either empty, or ends with one newline.
      - id: check-added-large-files # prevents giant files from being committed.
        args: [ "--maxkb=20480" ]
      - id: check-case-conflict # checks for files that would conflict in case-insensitive filesystems.
      - id: check-json # Attempts to load all json files to verify syntax.
      - id: check-merge-conflict # checks for files that contain merge conflict strings.
      - id: check-yaml # checks yaml files for parseable syntax.
      - id: detect-private-key # detects the presence of private keys.
        exclude: "^docker/https-proxy/.*$"
      - id: mixed-line-ending # replaces or checks mixed line ending.
        args: [ "--fix=auto" ]
      - id: no-commit-to-branch
        args:
        - --branch=main
      - id: pretty-format-json
        args:
          - "--autofix"
          - "--indent=4"
          - "--no-sort-keys"
          - "--no-ensure-ascii"
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: d0e12caebb2ab0ee8bf98181c8bfe9702bca103d  # frozen: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--recursive
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: fb24a639f7c938759fe56eeebbb7713b69d60494  # frozen: v0.5.1
    hooks:
      - id: go-fmt # Runs gofmt
      - id: go-imports # Runs gofmt
      - id: go-mod-tidy # Tidies up and removes unused requires in go.mod using go mod tidy
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 1080181b6ffd634ba7b93907d49cd09129023db0  # frozen: 43.115.1
    hooks:
      - id: renovate-config-validator
  - repo: local
    hooks:
      - id: cypress-clear-no-chain
        name: prevent unsafe Cypress command chaining
        entry: go run ./scripts/pre-commit/prevent_unsafe_chains/main.go
        language: golang
        language_version: 1.26.2
        types: [ file ]
        files: \.cy.js$
      - id: stop-only
        name: stop Cypress it.only
        entry: go run ./scripts/pre-commit/prevent_it_only/main.go
        language: golang
        language_version: 1.26.2
        types: [ file ]
        files: \.cy.js$
  - repo: https://github.com/Yelp/detect-secrets
    rev: 68e8b45440415753fff70a312ece8da92ba85b4a  # frozen: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline', '--exclude-files', 'package-lock.json']
